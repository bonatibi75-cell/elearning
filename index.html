<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Elektronikus tanulás - Beadandó</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            /* IDE ÍRD A KÉPED NEVÉT VAGY LINKJÉT */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('1.kep.jpg'); 
            
            /* Beállítások, hogy a kép kitöltse a képernyőt */
            background-size: cover;       /* Kitölti a teljes területet */
            background-position: center;  /* Középre igazítja a képet */
            background-attachment: fixed; /* Görgetésnél is fix marad */
            
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Balra igazítás */
        }

        .tartalom-doboz {
            margin-left: 60px;
            max-width: 450px; /* Kicsit szélesebb a sok szöveg miatt */
            
            /* ÁTTETSZŐ HÁTTÉR ÉS ELHOMÁLYOSÍTÁS */
            background: rgba(0, 0, 0, 0.4); /* Félátlátszó fekete */
            backdrop-filter: blur(12px);    /* Az "áttűnő" üveg hatás kulcsa */
            -webkit-backdrop-filter: blur(12px); /* Safari támogatás */
            
            padding: 40px;
            border-left: 5px solid #bf4722; /* Egyetemi stílusú díszcsík */
            border-top: 1px solid rgba(255,255,255,0.1); /* Finom élkeret */
            border-bottom: 1px solid rgba(255,255,255,0.1);
            
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-radius: 0 15px 15px 0; /* Modern lekerekítés a jobb oldalon */
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff7e47; /* Kiemelt tudományos szín */
        }

        p {
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9); /* Majdnem fehér a jó olvashatóságért */
            text-align: justify; /* Tudományos stílusú sorkizárás */
        }

        .gomb {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 35px;
            background-color: #bf4722;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(191, 71, 34, 0.3);
        }

        .gomb:hover {
            background-color: #e6562b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 86, 43, 0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="tartalom-doboz">
        <h1>A kihalások története</h1>
        
        
        <a href="dia1.html" class="gomb">TANANYAG INDÍTÁSA</a>
    </div>

</body>
</html>
